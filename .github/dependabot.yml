version: 2
updates:
  # Keep npm dependencies patched. Minor/patch updates are grouped into a
  # single PR each week to cut noise; major bumps come as individual PRs.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
