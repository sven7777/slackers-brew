name: Deploy

# Merging to main = migrated + deployed:
#   1. migrate — applies any new supabase/migrations/*.sql to the live database
#      (`supabase db push` consults the remote migration-history table, so runs
#      with nothing new are a no-op).
#   2. deploy — builds the SPA and uploads dist/ to DreamHost over sftp
#      (sftp, NOT rsync — rsync hangs on DreamHost shared hosting).
#
# Manual runs (workflow_dispatch) do the same; the repair_baseline input exists
# for the one-time bootstrap of the migration-history table (0001–0005 were
# originally hand-run in the SQL Editor before this workflow existed).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      repair_baseline:
        description: "One-time: mark migrations 0001-0005 as already applied (bootstrap the remote history table)"
        type: boolean
        default: false

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref oqmalafznazxqtzbapnu

      - name: Baseline migration history (one-time)
        if: ${{ inputs.repair_baseline }}
        run: |
          for v in 0001 0002 0003 0004 0005; do
            supabase migration repair --status applied "$v"
          done

      - name: Apply migrations
        run: supabase db push

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/known_hosts <<'EOF'
          iad1-shared-e1-29.dreamhost.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMzN9sXrYPW0V2PqfLeUoDmGzwWX36Bk9lBt1Jm/8z3b
          iad1-shared-e1-29.dreamhost.com ssh-rsa 
          EOF
        env:
          DEPLOY_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}

      - name: Upload dist/ over sftp
        run: |
          cd dist
          {
            echo "cd brew.slackersbrewing.com"
            echo "put -r assets"
            # Explicit per-file puts so hidden files (.htaccess) aren't skipped.
            find . -maxdepth 1 -type f | sed 's|^\./|put |'
            echo "bye"
          } > "$RUNNER_TEMP/sftp_batch"
          sftp -oBatchMode=yes -oIdentitiesOnly=yes -i ~/.ssh/deploy_key \
            -b "$RUNNER_TEMP/sftp_batch" \
            slackersbrew@iad1-shared-e1-29.dreamhost.com
